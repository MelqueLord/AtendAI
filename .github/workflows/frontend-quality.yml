name: Frontend Quality

on:
  pull_request:
    paths:
      - "Atendai.Web/**"
      - ".github/workflows/frontend-quality.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "Atendai.Web/**"
      - ".github/workflows/frontend-quality.yml"

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Atendai.Web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Atendai.Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate

      - name: Build
        run: npm run build
